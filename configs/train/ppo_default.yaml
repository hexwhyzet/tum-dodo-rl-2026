# @package _global_.train
algo: ppo

# RSL-RL PPO hyperparameters (Isaac Lab default runner)
runner:
  num_steps_per_env: 24       # rollout length per env
  max_iterations: 3000
  save_interval: 100
  experiment_name: "${run_name}"
  run_name: ""
  resume: false
  load_run: -1
  checkpoint: -1

policy:
  class_name: ActorCritic
  init_noise_std: 1.0
  actor_hidden_dims: [512, 256, 128]
  critic_hidden_dims: [512, 256, 128]
  activation: elu

algorithm:
  class_name: PPO
  value_loss_coef: 1.0
  use_clipping: true
  clip_param: 0.2
  entropy_coef: 0.01
  num_learning_epochs: 5
  num_mini_batches: 4
  learning_rate: 1.0e-3
  schedule: adaptive        # reduce lr when kl diverges
  gamma: 0.99
  lam: 0.95
  desired_kl: 0.01
  max_grad_norm: 1.0
